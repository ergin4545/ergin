<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERGİN 3D</title>
  <link rel="stylesheet" href="style.css">
  <!-- Plotly.js Kütüphanesi -->
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
    <h1>ERGİN 3D</h1>

    <div id="status" class="status">Cihaz Bağlı Değil</div>

    <div class="buttons">
      <button id="btnConnect">📶 Bluetooth Bağlan</button>
      <button id="btnDisconnect">❌ Bağlantıyı Kes</button>
      <button id="btnStartScan">▶️ Taramayı Başlat</button>
      <button id="btnStopScan">⏹️ Taramayı Durdur</button>
    </div>

    <div class="view-controls">
      <button id="btn3D">3D Yüzey Haritası</button>
      <button id="btn2D">2D Isı Haritası</button>
    </div>

    <!-- Grafik Alanı -->
    <div class="plot-container">
      <div id="scanPlot" style="width:100%; height:100%;"></div>
    </div>

    <!-- Analiz Paneli -->
    <div class="analysis-box">
      <h3>📊 Anomali & Veri Analizi</h3>
      <p>En Yüksek (Metal): <span id="maxVal">0</span></p>
      <p>En Düşük (Boşluk): <span id="minVal">0</span></p>
      <p>Aritmetik Fark: <span id="diffVal">0</span></p>
      <p id="statusMsg" style="color: #00ff88; font-weight: bold; margin-top: 5px;">Veri Bekleniyor...</p>
    </div>
  </div>

  <!-- JS Dosyaları -->
  <script src="Bluetooth.js"></script>
  <script src="scan.js"></script>
  <script src="app.js"></script>

</body>
</html>
