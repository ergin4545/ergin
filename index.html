<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERGİN - Profesyonel Yeraltı Analiz</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<!-- Profesyonel 3D / 2D Isı Haritası Kütüphanesi -->
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo" alt="ERGİN Logo">
  <h1>ERGİN 3D</h1>

  <div id="statusBadge" class="status">Bağlı Değil</div>

  <div class="buttons">
    <button id="connectBtn">📶 Bluetooth Bağlan</button>
    <button id="disconnectBtn">❌ Bağlantıyı Kes</button>
    <button id="scanBtn">▶️ Taramayı Başlat</button>
    <button id="stopBtn">⏹️ Taramayı Durdur</button>
  </div>

  <!-- Görünüm Değiştirme Butonları -->
  <div class="view-controls">
    <button type="button" id="btn3D" onclick="switchView('3d')">3D Yüzey Haritası</button>
    <button type="button" id="btn2D" onclick="switchView('2d')">2D Isı Haritası</button>
  </div>

  <!-- 3D / 2D Grafiğin Çizileceği Alan -->
  <div id="scanPlot" class="plot-container"></div>

  <!-- Aritmetik Analiz Paneli -->
  <div id="analysisPanel" class="analysis-box">
    <h3>📊 Anomali & Veri Analizi</h3>
    <p>En Yüksek (Metal): <span id="maxVal">0</span></p>
    <p>En Düşük (Boşluk): <span id="minVal">0</span></p>
    <p>Aritmetik Fark: <span id="diffVal">0</span></p>
    <p id="statusMsg">Tarama bekleniyor...</p>
  </div>

</div>

<script src="bluetooth.js"></script>
<script src="scan.js"></script>
<script src="storage.js"></script>
<script src="settings.js"></script>
<script src="app.js"></script>

</body>
</html>
